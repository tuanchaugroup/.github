name: Generate Snakes

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Bước 1: Tạo con rắn cho thangknt99
      - name: generate-snake-thangknt99
        uses: Platane/snk@v3
        with:
          github_user_name: thangknt99
          outputs: |
            dist/snake-thangknt99.svg
            dist/snake-thangknt99-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: generate-snake-toilatu
        uses: Platane/snk@v3
        with:
          github_user_name: toilatu
          outputs: |
            dist/snake-toilatu.svg
            dist/snake-toilatu-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: generate-snake-binhnh-098
        uses: Platane/snk@v3
        with:
          github_user_name: binhnh-098
          outputs: |
            dist/snake-binhnh-098.svg
            dist/snake-binhnh-098-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Bước 2: Tạo con rắn cho tienoho
      - name: generate-snake-tienoho
        uses: Platane/snk@v3
        with:
          github_user_name: tienoho
          outputs: |
            dist/snake-tienoho.svg
            dist/snake-tienoho-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bước 3: Đẩy tất cả file lên nhánh output
      - name: push snakes to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
